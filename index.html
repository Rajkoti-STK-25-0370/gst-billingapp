<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stackly Login</title>

  <!-- Tailwind (CDN) – used only for this static HTML page -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Playfair Display (for WELCOME) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

  <style>
    /* Optional: basic light/dark variables similar to your globals */
    :root {
      --background: #ffffff;
      --foreground: #171717;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --background: #0a0a0a;
        --foreground: #ededed;
      }
    }
    body {
      background: var(--background);
      color: var(--foreground);
      font-family: Arial, Helvetica, sans-serif;
    }
    /* Use same letterspacing/typography for WELCOME */
    .font-playfair {
      font-family: "Playfair Display", serif;
      letter-spacing: 0.6em;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col bg-white">
  <!-- HEADER (matches your Header component visually) -->
  <header class="w-full border-b border-gray-200/60 bg-white">
    <div class="mx-auto max-w-[1200px] w-full px-5 sm:px-10 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="/stackly.png" alt="Stackly" class="w-7 h-7 object-contain" />
        <span class="text-sm font-medium tracking-wide text-gray-700">
          GST BILLING
        </span>
      </div>

      <div class="flex items-center gap-3">
        <button class="text-sm text-gray-800 hover:text-gray-900">
          Log in or create account
        </button>
        <button class="inline-flex items-center gap-2 rounded-md border border-gray-300 px-3 py-1.5 text-sm font-medium text-gray-700 hover:bg-gray-50">
          <svg width="16" height="16" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.3 0 6.2 1.1 8.5 3.2l6.4-6.4C35.5 2.1 30.1 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.9 6.1C12.3 13.5 17.6 9.5 24 9.5z"/>
            <path fill="#34A853" d="M46.6 24.6c0-1.5-.1-2.6-.4-3.7H24v7h12.7c-.6 3-2.5 5.6-5.4 7.4l8.3 6.3c4.8-4.4 7-10.8 7-17z"/>
            <path fill="#4A90E2" d="M8.8 27.4a14.6 14.6 0 0 1 0-6.8l-7.9-6.1C-.6 17 0 20.4 0 24s.6 7 1.7 9.5l7.1-6.1z"/>
            <path fill="#FBBC05" d="M24 48c6.1 0 11.2-2 14.9-5.4l-8.3-6.3c-2.3 1.5-5.3 2.4-8.6 2.4-6.4 0-11.7-4-13.6-9.6l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/>
          </svg>
          Continue with Google
        </button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-1">
    <div class="mx-auto max-w-[1200px] px-5 sm:px-8 lg:px-10 py-8 lg:py-10">
      <div class="grid grid-cols-1 lg:grid-cols-[1.35fr_1fr] items-center gap-8">

        <!-- LEFT ILLUSTRATION (hidden on small screens) -->
        <div class="hidden lg:block">
          <img
            src="/illustration.png"
            alt="Illustration"
            width="720"
            height="520"
            class="w-full h-auto"
          />
        </div>

        <!-- RIGHT LOGIN CARD -->
        <div class="w-full max-w-md justify-self-center lg:justify-self-auto">
          <div
            class="
              relative
              rounded-[18px]
              text-white
              p-8 sm:p-10
              shadow-[0_24px_48px_rgba(0,0,0,0.35)]
              bg-gradient-to-b from-sky-400 via-blue-600 to-indigo-900
              overflow-hidden
            "
            aria-label="Login Panel"
          >
            <!-- Left/Right edge darkening -->
            <span
              aria-hidden="true"
              class="
                pointer-events-none
                absolute inset-y-0 left-4 w-16
                bg-[radial-gradient(60%_140%_at_0%_50%,rgba(0,0,0,0.35),rgba(0,0,0,0)_70%)]
                blur-[6px]
              "
            ></span>
            <span
              aria-hidden="true"
              class="
                pointer-events-none
                absolute inset-y-0 right-4 w-16
                bg-[radial-gradient(60%_140%_at_100%_50%,rgba(0,0,0,0.35),rgba(0,0,0,0)_70%)]
                blur-[6px]
              "
            ></span>

            <!-- Top white glow -->
            <span
              aria-hidden="true"
              class="
                pointer-events-none
                absolute left-1/2 -translate-x-1/2
                top-8
                h-44 w-44
                rounded-full
                bg-[radial-gradient(closest-side,rgba(255,255,255,0.95),rgba(255,255,255,0.2)_60%,transparent_100%)]
                blur-[18px]
              "
            ></span>

            <!-- Outer vignette -->
            <span
              aria-hidden="true"
              class="
                pointer-events-none
                absolute inset-0 rounded-[18px]
                bg-[radial-gradient(120%_140%_at_50%_0%,rgba(0,0,0,0)_20%,rgba(0,0,0,0.12)_60%,rgba(0,0,0,0.28)_100%)]
              "
            ></span>

            <!-- Content -->
            <div class="relative z-10">
              <!-- WELCOME -->
              <h2 class="font-playfair text-center text-[30px] sm:text-[34px] leading-none mb-6 font-bold">
                WELCOME
              </h2>

              <!-- Logo pill -->
              <div class="flex justify-center mb-8">
                <div
                  class="
                    bg-white
                    w-[130px] sm:w-[180px]
                    h-[70px]  sm:h-[85px]
                    rounded-[50%]
                    flex items-center justify-center
                    shadow-lg
                  "
                >
                  <img
                    src="C:\Users\Admin\gst-billingapp\public\stackly.png"
                    alt="Stackly Logo"
                    class="h-6 sm:h-8 object-contain"
                  />
                </div>
              </div>

              <!-- Divider -->
              <div class="h-px w-full bg-white/25 mb-4"></div>

              <!-- Email -->
              <div class="mb-4">
                <div class="relative">
                  <span class="pointer-events-none absolute left-0 top-1/2 -translate-y-1/2 pl-1.5 text-white/80">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path
                        d="M4 6h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1zm0 0 8 6 8-6"
                        stroke="currentColor"
                        stroke-width="1.6"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                  </span>
                  <input
                    type="email"
                    placeholder="Email ID"
                    class="
                      w-full bg-transparent text-white placeholder-white/80
                      border-b border-white/40
                      focus:border-white focus:outline-none
                      py-2 pl-7 transition
                    "
                    aria-label="Email ID"
                    autocomplete="email"
                  />
                </div>
              </div>

              <!-- Password (glassy container) -->
              <div class="mb-5">
                <div class="bg-white/20 rounded-md p-3">
                  <div class="relative">
                    <span class="pointer-events-none absolute left-0 top-1/2 -translate-y-1/2 pl-1.5 text-white/80">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path
                          d="M17 11H7a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-6a1 1 0 0 0-1-1Zm-2 0V8a3 3 0 1 0-6 0v3"
                          stroke="currentColor"
                          stroke-width="1.6"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                      </svg>
                    </span>
                    <input
                      type="password"
                      placeholder="Password"
                      class="
                        w-full bg-transparent text-white placeholder-white/70
                        border-b border-white/40
                        focus:border-white focus:outline-none
                        py-2 pl-7 pr-9 transition
                      "
                      aria-label="Password"
                      autocomplete="current-password"
                    />
                  </div>
                </div>
              </div>

              <!-- Remember + Forgot -->
              <div class="flex items-center justify-between text-[13px] mb-4">
                <label class="inline-flex items-center gap-2 select-none">
                  <input type="checkbox" class="accent-sky-400" />
                  <span class="tracking-wide">Remember me</span>
                </label>
                <button class="text-white/90 hover:underline">Forgot Password?</button>
              </div>

              <!-- LOGIN -->
              <button
                class="
                  w-full rounded-md
                  bg-gradient-to-r from-blue-600 via-blue-500 to-blue-300
                  shadow-[0_8px_18px_rgba(37,99,235,0.40)]
                  active:translate-y-[1px]
                  hover:brightness-[1.05]
                  transition
                  text-white font-semibold py-2
                  border border-white/20
                "
              >
                LOGIN
              </button>

              <!-- Signup -->
              <div class="h-px w-full bg-white/15 mt-5 mb-3"></div>
              <p class="text-center text-sm">
                <span class="text-rose-300">Don’t have an account?</span>
                <button class="ml-1 underline-offset-2 hover:underline">Click here</button>
              </p>
            </div>
          </div>
        </div>
        <!-- /RIGHT LOGIN CARD -->

      </div>
    </div>
  </main>
</body>
</html>
``
